name: Build Windows EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Create launcher
        shell: python
        run: |
          code = '''
          import subprocess, sys, os, threading, time, webbrowser
          os.chdir(os.path.dirname(os.path.abspath(sys.argv[0])))
          def open_browser():
              time.sleep(4)
              webbrowser.open("http://localhost:8501")
          threading.Thread(target=open_browser, daemon=True).start()
          subprocess.run([sys.executable, "-m", "streamlit", "run", "app.py", "--server.headless=true"])
          '''
          with open("launcher.py", "w") as f:
              f.write(code)
      - name: Build EXE
        run: |
          pyinstaller --onefile --name my-app --add-data "app.py;." --add-data "sample_data.csv;." --add-data "main.py;." --add-data "analysis.py;." --add-data "charts.py;." --add-data "data_loader.py;." launcher.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/my-app.exe
